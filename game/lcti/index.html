<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{

p{font-size:.95rem;color:#a89e92;text-align:center;max-width:520px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  padding:.9rem 2.2rem;border:1px solid #3a3530;background:transparent;color:#c8c3bc;
  font-size:.9rem;font-family:inherit;cursor:pointer;transition:all .3s ease;
  letter-spacing:.08em;text-decoration:none;min-width:200px
}
.btn:hover{background:#1a1815;border-color:#8b7355;color:#e8e0d6}

.btn-secondary{border-color:#2a2520;color:#8b7e6e;font-size:.8rem;min-width:auto;padding:.6rem 1.2rem}
.btn-secondary:hover{border-color:#5a5044;color:#c8c3bc}
.screen{display:none;width:100%;animation:fadeIn .5s ease}
.screen.active{display:flex;flex-direction:column;align-items:center;gap:1.8rem}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)}}
.progress-wrap{width:100%;margin-bottom:.5rem}
.progress-label{display:flex;justify-content:space-between;font-size:.75rem;color:#5a5248;margin-bottom:.4rem}
.progress-bar{width:100%;height:2px;background:#1a1815;overflow:hidden}
.progress-fill{height:100%;width:0%;background:#8b7355;transition:width .5s cubic-bezier(.22,.61,.36,1)}
.question-counter{font-size:.75rem;color:#5a5248;letter-spacing:.1em}
.question-text{font-size:1.1rem;color:#e8e0d6;text-align:center;line-height:1.8;margin:.5rem 0;font-weight:300}
.dimension-tag{
  display:inline-block;font-size:.65rem;letter-spacing:.15em;
  padding:.2rem .7rem;border:1px solid #3a3530;color:#8b7e6e;margin-bottom:.3rem
}
.options{display:flex;flex-direction:column;gap:.6rem;width:100%;max-width:480px}
.option-btn{
  width:100%;padding:1rem 1.2rem;border:1px solid #2a2520;background:#0f0f11;
  color:#b0a89c;font-size:.9rem;font-family:inherit;cursor:pointer;text-align:left;
  transition:all .25s ease;line-height:1.5
}
.option-btn:hover{border-color:#5a5044;background:#161418;color:#e8e0d6}
.option-btn.selected{border-color:#8b7355;background:#1a1815;color:#e8e0d6}
.option-btn .option-label{display:inline-block;color:#5a5248;margin-right:.6rem;font-size:.75rem}
.result-char{width:120px;height:160px;margin:.5rem auto .2rem;opacity:0;animation:fadeIn .8s ease .3s forwards}
.result-char svg{width:100%;height:100%}.result-type{font-size:3rem;font-weight:700;letter-spacing:.35em;color:#d4a853;text-align:center;margin:0 0 .5rem;line-height:1.2}
.result-name{font-size:1.5rem;font-weight:300;letter-spacing:.15em;color:#e8e0d6;text-align:center;margin-bottom:1rem}
.result-dimensions{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem}
.result-dim{font-size:.7rem;letter-spacing:.12em;padding:.3rem .8rem;border:1px solid #3a3530;color:#8b7e6e}
.result-dim span{color:#d4a853}
.result-desc{font-size:.88rem;color:#a89e92;text-align:center;max-width:480px;line-height:1.9;margin-bottom:1.2rem}
.result-quote{font-size:.78rem;color:#5a5248;font-style:italic;text-align:center;border-left:2px solid #3a3530;padding-left:1rem;max-width:420px;margin-bottom:2rem;line-height:1.7}
.result-bars{width:100%;max-width:440px;margin:.5rem 0 1.2rem}
.bar-row{display:flex;align-items:center;gap:.5rem;margin:.4rem 0;font-size:.7rem}
.bar-label{width:2.5rem;text-align:right;color:#8b7e6e;letter-spacing:.1em;flex-shrink:0}
.bar-track{flex:1;height:6px;background:#1a1815;border-radius:3px;overflow:hidden;display:flex}
.bar-fill{height:100%;transition:width .6s cubic-bezier(.22,.61,.36,1)}
.bar-left{background:#d4a853}
.bar-right{background:#4a443c}
.bar-pct{width:4.2rem;text-align:center;font-size:.65rem;white-space:nowrap}
.pct-left{color:#d4a853}
.pct-sep{color:#3a3530;margin:0 .15rem}
.pct-right{color:#8b7e6e}
.result-actions{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center}
.dimension-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem 1.5rem;width:100%;max-width:400px;margin:.5rem 0}
.dim-item{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;color:#8b7e6e;letter-spacing:.08em;padding:.2rem 0}
.dim-item .dim-left{color:#c8c3bc}.dim-item .dim-right{color:#5a5248}.dim-sep{color:#3a3530;font-size:.6rem}
.splash-icon{font-size:3rem;color:#3a3530;letter-spacing:.3em;margin-bottom:1rem;opacity:.4}
.splash-icon span{display:inline-block;animation:pulse 2s ease-in-out infinite}
.splash-icon span:nth-child(2){animation-delay:.2s}
.splash-icon span:nth-child(3){animation-delay:.4s}
.splash-icon span:nth-child(4){animation-delay:.6s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.footer-text{font-size:.65rem;color:#2a2520;margin-top:2rem;text-align:center;letter-spacing:.05em}
.footer-text a{color:#3a3530;text-decoration:none}
.footer-text a:hover{color:#5a5044}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.confetti-piece{
  position:absolute;width:6px;height:6px;opacity:0;
  animation:confettiFall linear forwards
}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(-10px) rotate(0deg)}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
}
@media(max-width:480px){
  .container{padding:1.5rem 1rem}
  h1{font-size:1.8rem}
  .result-type{font-size:2.2rem;letter-spacing:.25em}
  .result-name{font-size:1.2rem}
  .question-text{font-size:.95rem}
  .option-btn{font-size:.82rem;padding:.85rem 1rem}
  .btn{min-width:160px;padding:.75rem 1.5rem}
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0a0a0c}
::-webkit-scrollbar-thumb{background:#2a2520}
</style>
</head>
<body>
<div class="container" id="app">
  <!-- INTRO -->
  <div class="screen active" id="screen-intro">
    <div class="splash-icon"><span>钟 --><span>儿</span><span>城</span><span>里</span></div>
    <h1><strong>LCTI</strong></h1>
    <h2>历城二中人格测试</h2>
    <div class="dimension-grid">
      <div class="dim-item"><span class="dim-left">勤</span><span class="dim-sep">/</span><span class="dim-right">怠</span></div>
      <div class="dim-item"><span class="dim-left">顺</span><span class="dim-sep">/</span><span class="dim-right">逆</span></div>
      <div class="dim-item"><span class="dim-left">信</span><span class="dim-sep">/</span><span class="dim-right">疑</span></div>
      <div class="dim-item"><span class="dim-left">群</span><span class="dim-sep">/</span><span class="dim-right">独</span></div>
    </div>
    <p>四维十六型，测测你在钟儿城里是哪一种人。</p>
    <div style="margin-top:.5rem"></div>
    <button class="btn btn-primary" onclick="startTest()">开始测试</button>
    <div class="footer-text">基于 Sangre-source · 共 32 题</div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="qLabel">1 / 32</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="result-char" id="resultChar"></div>
    <div class="result-type" id="resultCode">QNYD</div>
    <div class="result-name" id="resultName">剑客</div>
    <div class="result-dimensions" id="resultDims"></div>
    <div class="result-bars" id="resultBars"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="result-quote" id="resultQuote"></div>
    <div class="result-actions">
      <button class="btn btn-primary" onclick="shareResult()">分享结果</button>
      <button class="btn btn-secondary" onclick="restartTest()">重新测试</button>
      <button class="btn btn-secondary" onclick="viewTypes()">查看全部类型</button>
    </div>
    <div class="footer-text"><a href="https://la-sangre-de-sancho.github.io" target="_blank" rel="noopener">← 回到博客</a></div>
  </div>

  <!-- ALL TYPES -->
  <div class="screen" id="screen-types">
    <h2 style="margin-bottom:1.5rem">十六种类型</h2>
    <div id="typesGrid" style="width:100%"></div>
    <button class="btn btn-secondary" onclick="showScreen('screen-result')" style="margin-top:1.5rem">← 返回结果</button>
    <button class="btn btn-secondary" onclick="restartTest()" style="margin-top:.6rem">重新测试</button>
  </div>
</div>

<script>
const DIMS = [
  { id:'qin',  label:'勤怠', left:'勤', right:'怠' },
  { id:'shun', label:'顺逆', left:'顺', right:'逆' },
  { id:'xin',  label:'信疑', left:'信', right:'疑' },
  { id:'qun',  label:'群独', left:'群', right:'独' }
];
const QUESTIONS = [
  // 勤怠 (1-8)
  { q:'看到别人在自习课上拼命刷题，你会？', dim:'qin',
    a:'感到焦虑，立刻加入刷题', b:'会受影响，加快自己节奏',
    c:'不太在意，按自己步调走', d:'觉得太卷了，与我无关' },
  { q:'对于"不苦不成材"这句话，你的态度是？', dim:'qin',
    a:'深以为然，痛苦是必经之路', b:'有一定道理，但未必全对',
    c:'不太认同，健康和快乐更重要', d:'完全错误，这是对生命的消耗' },
  { q:'如果一整天完全没有学习，你会？', dim:'qin',
    a:'产生强烈负罪感，坐立不安', b:'有些愧疚，会之后补回来',
    c:'觉得偶尔放松很正常', d:'完全无所谓，休息天经地义' },
  { q:'周末或假期，你通常会？', dim:'qin',
    a:'大部分时间用在学习上', b:'学习为主，适当放松',
    c:'放松为主，抽空学习', d:'完全不碰学习，彻底休息' },
  { q:'对于学校安排的额外补课或延长自习，你？', dim:'qin',
    a:'非常支持，多学总没坏处', b:'可接受，如果确有需要',
    c:'不太赞同，效率更重要', d:'坚决反对，疲劳战毫无意义' },
  { q:'当身体感到不适时，你会？', dim:'qin',
    a:'只要不倒下就坚持上课', b:'尽量坚持，实在不行再请假',
    c:'适当休息，量力而行', d:'立即休息或请假，身体第一' },
  { q:'看到周围同学闲聊或玩手机，你的第一反应是？', dim:'qin',
    a:'替他们着急，浪费时间', b:'觉得不太应该但无所谓',
    c:'很正常，需要放松', d:'羡慕他们，我也想这样' },
  { q:'对"只要学不死，就往死里学"的看法是？', dim:'qin',
    a:'值得敬佩的精神', b:'精神可嘉但不宜提倡',
    c:'有些极端，不值得效仿', d:'完全错误，学习不该是自我毁灭' },
  // 顺逆 (9-16)
  { q:'当学校的规定让你感到不合理时，你会？', dim:'shun',
    a:'无条件遵守，学校自有道理', b:'心里不满但老实遵守',
    c:'在规则边缘试探', d:'直接质疑或绕开规定' },
  { q:'对严查"男女生不正常交往"的看法是？', dim:'shun',
    a:'完全支持，避免早恋影响学习', b:'可以理解，但方式欠妥',
    c:'过度干预，侵犯社交权利', d:'荒谬可笑，本质是控制' },
  { q:'如果督查老师因小事严厉批评你，你会？', dim:'shun',
    a:'立刻认错道歉', b:'虽然委屈但还是认错',
    c:'找机会解释清楚', d:'据理力争，绝不认错' },
  { q:'对于学校禁止带零食的规定，你？', dim:'shun',
    a:'严格遵守，不给学校添麻烦', b:'尽量遵守，偶尔偷偷带',
    c:'经常偷偷带', d:'认为规定本身就有问题，不遵守' },
  { q:'学校统一发型着装的要求，你的态度是？', dim:'shun',
    a:'完全支持，减少攀比', b:'可以接受，虽然不方便',
    c:'不太认同，压制个性', d:'坚决反对，这是对人权的侵犯' },
  { q:'如果发现学校规定侵犯了学生基本权益，你会？', dim:'shun',
    a:'相信学校有它的考量', b:'私下向老师反映',
    c:'和同学讨论但不会行动', d:'通过各种渠道举报或抗争' },
  { q:'学校在招生中夸大成绩的做法，你如何看待？', dim:'shun',
    a:'可以理解，为了学校声誉', b:'不太认同，但可以接受',
    c:'觉得不妥，这是欺骗', d:'不能接受，这是原则问题' },
  { q:'当周围所有人都保持沉默时，你选择？', dim:'shun',
    a:'随大流沉默', b:'心里有想法但不说',
    c:'私下和信任的人说', d:'公开表达自己的观点' },
  // 信疑 (17-24)
  { q:'学校公众号的"学霸经验分享"，你觉得？', dim:'xin',
    a:'很励志，可以作为榜样', b:'部分可信，参考就好',
    c:'多半经过包装和删改', d:'全是宣传，不可相信' },
  { q:'对于"勤志文化"的宣传，你的感受是？', dim:'xin',
    a:'深受激励，有正面意义', b:'有一定作用但被过度强调',
    c:'更像一种管理手段', d:'就是精神控制和宣传话术' },
  { q:'当听到"你们要感恩母校"时，你内心？', dim:'xin',
    a:'心怀感激，母校给了很多', b:'有感激但也有不满',
    c:'心情复杂，感恩不由经历决定', d:'反感，这是一种道德绑架' },
  { q:'学校说"一切都是为了学生好"，你相信吗？', dim:'xin',
    a:'完全相信', b:'基本相信',
    c:'部分不信，有利益考量', d:'完全不信，是为了学校声誉' },
  { q:'当学校宣传的升学率与你感受不符时，你？', dim:'xin',
    a:'相信官方数据', b:'可能我了解的信息不全',
    c:'质疑数据的真实性', d:'认为学校一定造假了' },
  { q:'老师说的"上了大学就轻松了"，你？', dim:'xin',
    a:'当做美好的期许', b:'半信半疑，但希望是真的',
    c:'不太信，知道是画饼', d:'早就看穿了，不过是安慰而已' },
  { q:'学校举办的宣誓大会、励志报告会，你觉得？', dim:'xin',
    a:'确实振奋人心', b:'有一定作用但形式化',
    c:'形式大于内容', d:'纯粹的集体情绪操作' },
  { q:'毕业之后，你如何评价这所学校？', dim:'xin',
    a:'管理严格成绩优异的好学校', b:'有好有坏，瑕不掩瑜',
    c:'弊大于利，压抑学生', d:'将学生异化为考试机器的工厂' },
  // 群独 (25-32)
  { q:'在集体中，你更倾向于？', dim:'qun',
    a:'完全融入，和大家保持一致', b:'大部分时候跟随集体',
    c:'保留自己的独立性', d:'坚持自我，不被集体左右' },
  { q:'对于"少数服从多数"这个原则，你？', dim:'qun',
    a:'完全认同，集体和谐很重要', b:'基本认同，但有例外',
    c:'不太认同，尊重少数', d:'警惕，多数不一定正确' },
  { q:'在宿舍里，你通常是？', dim:'qun',
    a:'和室友一起行动', b:'经常和室友待在一起',
    c:'有时一起有时独处', d:'独来独往，需要自己的空间' },
  { q:'当你的观点与大多数人格格不入时，你会？', dim:'qun',
    a:'为了合群而保留意见', b:'看情况决定是否表达',
    c:'在信任的人面前表达', d:'大方表达，不在意被孤立' },
  { q:'你如何看待班级/集体荣誉？', dim:'qun',
    a:'非常在意，是前进动力', b:'比较在意，有荣誉感',
    c:'不太在意，个人更重要', d:'完全不在意，那是虚幻的东西' },
  { q:'你更容易在哪里找到归属感？', dim:'qun',
    a:'在集体中，和大家一起', b:'在几个好友的小圈子中',
    c:'在少数真正懂你的人中', d:'在自己身上，不需要外在归属' },
  { q:'对于学校强调的"集体主义"，你？', dim:'qun',
    a:'完全认可，个人是渺小的', b:'认可，但也要尊重个体',
    c:'不太认可，容易牺牲个体', d:'反感，是个体自由的枷锁' },
  { q:'如果集体在做一件你认为是错的事，你会？', dim:'qun',
    a:'跟随集体，相信大家', b:'虽然不认同但不会反对',
    c:'委婉地提出不同意见', d:'坚决反对，不与之为伍' }
];;
const TYPES = {
  'QSXC':{ name:'拓疆者',
    desc:'你是学校引以为傲的典范——勤勉、顺从、笃信、合群。你相信天道酬勤，遵守一切规则，信任官方叙事，并在集体中找到归属感。你是"勤志文化"最完美的注脚，是那株被精心培育、最终开出标准花朵的植物。你的道路清晰而笔直，每一步都踩在学校的节拍上。',
    quote:'"越早进入这条轨道，就越能在高考的独木桥上占据先机。"' },
  'QSXI':{ name:'孤灯',
    desc:'你拥有学校欣赏的一切品质，唯独习惯独行。你认真、听话、信念坚定，却在深夜里独自亮着灯。集体荣誉榜上有你的名字，但集体活动里很少见到你的身影。你在千篇一律的试卷中寻找属于自己的微小进步空间。',
    quote:'"在千篇一律的试卷和排名图景下，寻找自己微小的进步空间。"' },
  'QSYC':{ name:'迷途',
    desc:'你做着所有正确的事：努力学习、遵守纪律，和朋友们保持着良好关系。但你内心深处藏着一丝怀疑——那些官方叙事和你的真实体验之间，似乎隔着一层透明的墙。你和朋友们私下交换着心照不宣的眼神，在勤志的洪流中小心保持着清醒。',
    quote:'"我那时便向往起外面的生活来，甚至有些想住进对面的屋子。"' },
  'QSYI':{ name:'暗流',
    desc:'你按照规则行事，比谁都努力，但你的心并不在这个系统里。你看穿了那些精心编织的叙事，却依然沉默地配合着。你像一条地下的暗流——表面上波澜不惊，内心深处却汹涌着怀疑与疏离。',
    quote:'"我终于能在软床上好梦了。可是我丢了一部分，丢在那四方城里。"' },
  'QNXC':{ name:'狂徒',
    desc:'你精力充沛、勤奋刻苦，信仰自己的理想而非权威的命令。你是制度内部最忠诚的反对者——相信学校的使命，但痛恨它的执行方式。你会为了你认为正确的事情振臂高呼，这是一种危险的组合：信仰加上反叛。',
    quote:'"这或许也是最让人气愤的一点。"' },
  'QNXI':{ name:'骑士',
    desc:'你信奉努力的价值，有着自己的道德准则，但不为任何群体所绑架。你是独行的骑士：勤勉于自己的追求，桀骜于不公的权威，忠诚于内心的信念。你的剑只为自己相信的东西出鞘。',
    quote:'"我自认我并不是一个多有素质的人。"' },
  'QNYC':{ name:'破钟',
    desc:'你勤奋、怀疑、反抗——并且这一切都与你的朋友们一起。你是那面裂了却依然轰鸣的钟，声音嘶哑但传得最远。你和你的同志们彼此看见，彼此确认，在被修剪的校园里做未被修剪的人。',
    quote:'"我们总会听到千篇一律的美称……可我们究竟该信些什么？"' },
  'QNYI':{ name:'剑客',
    desc:'孤独的求索者。你勤于思考，逆于权威，疑于叙事，独于人群。你像一个独行的剑客，用笔做刀，剖开那些精心包装的谎言。你的文字曾被删除，你的声音曾被消音，但火焰在你心中从未熄灭。',
    quote:'"可那灵魂所经历的，确是事实，却不是历史。那是不被承认、无法记录的。"' },
  'DSXC':{ name:'暖阳',
    desc:'温和、知足、合群——你是集体中的暖阳。不过分苛求自己，遵守规则，相信世间的善意，被朋友们包围着。你证明了在这样一所高压的学校里，仍可以以一种松弛的姿态存活。',
    quote:'"我们这些互相咒骂的，这也称得上是颇为可笑了。"' },
  'DSXI':{ name:'隐士',
    desc:'你低着头，相信着系统，不问是非，只求安宁。不好高骛远，不叛逆，不质疑——只是在围墙之内安静地过自己的日子。隐士在牢笼中也能找到内心的平静。',
    quote:'"我毕竟是算不上人物的。我只好安分地埋葬了自己三年。"' },
  'DSYC':{ name:'清醒',
    desc:'你没有那么拼，也没有那么听话——但你有一起看透这一切的朋友。你和你的朋友构成了学校里一条隐秘的暗线：清醒、松弛、彼此确认。你们用玩笑消解着荒谬。',
    quote:'"可惜的是，有些记忆并不被允许拥有长久的未来。"' },
  'DSYI':{ name:'旁观',
    desc:'疏离而清醒。你不信这套系统，但也懒得和它较劲。你见过太多真相以至于不再天真，但也疲惫到不愿举起旗帜。你站在人群之外，像看一场荒诞剧一样看着校园生活在你面前展开。',
    quote:'"愤而哂笑之余，想到一句贵校常说的话。"' },
  'DNXC':{ name:'侠客',
    desc:'你相信某些东西——只是不信学校灌输的那套。你和你的朋友们一起，以戏谑和反叛对抗僵硬的制度。你们不把生活看得太严肃，但把彼此看得很重。你们在密不透风的纪律中为自己和朋友们开辟出一片自由的飞地。',
    quote:'"三流学校管纪律。"' },
  'DNXI':{ name:'浪人',
    desc:'一个不让任何人驯服的灵魂。你不接受被定义，拒绝了系统的所有馈赠。你像一阵风穿过校园，不属于任何班级、任何小团体、任何叙事。你是无主的浪人，自由但孤独，纯粹但漂泊。',
    quote:'"我拖着我的躯体，却丢失了我的声带。我对着这四方城怒吼，却只有喧嚣的风声。"' },
  'DNYC':{ name:'火种',
    desc:'你和你的朋友们一起：厌倦着谎言，反抗着权威，质疑着一切。你们不寻求来自学校的认可——你们只寻求彼此的认可。你们是散落在学校各处的微小火种，每一次眼神的交换都是一次引燃。',
    quote:'"当那些颐指气使的叫兽用古典的思维指挥我们时，我的一部分也被磨搓下来。"' },
  'DNYI':{ name:'游离',
    desc:'最终的局外人。你已超脱了整个游戏——既不勤奋，也不顺从；既不笃信，也不合群。因为彻底放下，所以彻底自由。你从围墙之外回望这所学校，看清它真正的面目：一台吞噬青春、产出数字的机器。',
    quote:'"有些人殚精竭虑，日积月累写下那些文字……这对他已经没有任何好处。"' }
};
const POLE_KEYS = { qin:{left:'Q',right:'D'}, shun:{left:'S',right:'N'}, xin:{left:'X',right:'Y'}, qun:{left:'C',right:'I'} };
const DIM_KEYS = ['qin','shun','xin','qun'];

let currentQ = 0;
let answers  = { qin:[], shun:[], xin:[], qun:[] };

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function startTest(){
  currentQ = 0;
  answers = { qin:[], shun:[], xin:[], qun:[] };
  showScreen('screen-quiz');
  renderQuestion();
}

function getCharColors(code){
  // Unique color palette per type code
  const palettes = {
    'QSXC':{bg:'#2a3a4a',skin:'#f0d5b8',hair:'#4a3520',cloth:'#3a6a5a',acc:'#c4a44a'},
    'QSXI':{bg:'#2a3a5a',skin:'#f0d8b8',hair:'#5a4020',cloth:'#3a5a6a',acc:'#8a7a5a'},
    'QSYC':{bg:'#3a3a3a',skin:'#edd4b8',hair:'#3a3020',cloth:'#5a4a3a',acc:'#7a8a5a'},
    'QSYI':{bg:'#2a2a3a',skin:'#f0d8b8',hair:'#4a3a2a',cloth:'#4a4a5a',acc:'#8a7a6a'},
    'QNXC':{bg:'#4a2a2a',skin:'#edd4b0',hair:'#3a2a1a',cloth:'#6a3a3a',acc:'#c4a44a'},
    'QNXI':{bg:'#3a2a3a',skin:'#f0d5b0',hair:'#5a3020',cloth:'#5a3a4a',acc:'#9a7a5a'},
    'QNYC':{bg:'#2a3a2a',skin:'#edd4b0',hair:'#4a3020',cloth:'#3a5a3a',acc:'#b4a44a'},
    'QNYI':{bg:'#2a2a3a',skin:'#f0d5b0',hair:'#3a2a2a',cloth:'#4a3a4a',acc:'#9a8a6a'},
    'DSXC':{bg:'#4a4a3a',skin:'#f0dcc0',hair:'#6a5a3a',cloth:'#5a6a4a',acc:'#b4a46a'},
    'DSXI':{bg:'#3a4a4a',skin:'#f0dcc0',hair:'#5a4a3a',cloth:'#4a5a5a',acc:'#8a9a6a'},
    'DSYC':{bg:'#4a3a2a',skin:'#eddcc0',hair:'#5a4a2a',cloth:'#6a5a3a',acc:'#a48a5a'},
    'DSYI':{bg:'#3a3a4a',skin:'#f0dcc0',hair:'#5a4a3a',cloth:'#4a4a5a',acc:'#7a8a7a'},
    'DNXC':{bg:'#4a2a3a',skin:'#edd4b0',hair:'#3a201a',cloth:'#6a3a4a',acc:'#b49a4a'},
    'DNXI':{bg:'#2a3a4a',skin:'#f0d4b0',hair:'#4a2a1a',cloth:'#3a4a5a',acc:'#9a7a5a'},
    'DNYC':{bg:'#3a2a2a',skin:'#eddcc0',hair:'#4a3020',cloth:'#4a4a3a',acc:'#a4a45a'},
    'DNYI':{bg:'#2a2a2a',skin:'#f0dcc0',hair:'#3a2a2a',cloth:'#3a3a3a',acc:'#8a8a7a'}
  };
  return palettes[code] || palettes['QNYI'];
}

function getHairSVG(code, color){
  const map = {
    'Q':{S:'M42,20 Q45,10 55,5 L60,3 L65,5 Q75,10 78,20 L80,30 L76,28 Q70,22 60,20 Q50,22 44,28 L40,30 Z',
         N:'M40,18 Q50,2 60,0 Q70,2 80,18 L78,25 Q70,20 60,18 Q50,20 42,25 Z'},
    'D':{S:'M42,25 Q50,15 60,12 Q70,15 78,25 L76,30 Q68,22 60,20 Q52,22 44,30 Z',
         N:'M40,22 Q55,0 60,0 Q65,0 80,22 L78,28 Q68,18 60,16 Q52,18 42,28 Z'}
  };
  const h = map[code[0]]?.[code[1]==='S'?'S':'N'] || map['Q']['S'];
  return '<path d="'+h+'" fill="'+color+'"/>';
}

function getOutfitSVG(code, color){
  if(code[2]==='X'){
    return '<path d="M35,80 L35,120 C35,122 38,124 40,124 L48,124 L48,90 C48,87 52,87 52,90 L52,124 L60,124 L60,90 C60,87 64,87 64,90 L64,124 L72,124 C74,124 77,122 77,120 L77,80 Z" fill="'+color+'"/>'+
           '<path d="M42,82 L48,85 L48,120 L42,116 Z M64,85 L70,82 L70,116 L64,120 Z" fill="'+(code[3]==='C'?'#3a4a3a':'#4a3a3a')+'" opacity="0.3"/>';
  } else {
    return '<path d="M38,82 Q60,75 82,82 L85,90 L82,88 L78,95 L75,120 C75,122 72,124 70,124 L42,124 C40,124 37,122 37,120 L34,95 L30,88 L27,90 Z" fill="'+color+'"/>'+
           '<line x1="40" y1="88" x2="72" y2="88" stroke="'+(code[3]==='C'?'#3a4a3a':'#4a3a3a')+'" stroke-width="2" opacity="0.3"/>';
  }
}

function getAccessorySVG(code){
  const cx=95, cy=95;
  if(code[3]==='C'){
    // Group - overlapping circles
    return '<circle cx="'+(cx-12)+'" cy="'+cy+'" r="10" fill="none" stroke="#d4a853" stroke-width="2" opacity="0.6"/>'+
           '<circle cx="'+cx+'" cy="'+(cy-8)+'" r="10" fill="none" stroke="#d4a853" stroke-width="2" opacity="0.6"/>'+
           '<circle cx="'+(cx+12)+'" cy="'+cy+'" r="10" fill="none" stroke="#d4a853" stroke-width="2" opacity="0.6"/>';
  } else {
    // Individual - single circle with dot
    return '<circle cx="'+cx+'" cy="'+cy+'" r="12" fill="none" stroke="#8b7e6e" stroke-width="2" opacity="0.6"/>'+
           '<circle cx="'+cx+'" cy="'+cy+'" r="4" fill="#8b7e6e" opacity="0.6"/>';
  }
}

function getCharEmoji(code){
  const emojis = {
    'QSXC':'🌅','QSXI':'💡','QSYC':'🌊','QSYI':'🌙',
    'QNXC':'🔥','QNXI':'⚔️','QNYC':'🔔','QNYI':'🗡️',
    'DSXC':'☀️','DSXI':'🏠','DSYC':'👁️','DSYI':'👓',
    'DNXC':'🦅','DNXI':'🍃','DNYC':'✨','DNYI':'🌌'
  };
  return emojis[code] || '❓';
}

function generateCharSVG(code){
  const c = getCharColors(code);
  const cx=60, cy=80;
  return '<svg viewBox="0 0 120 160" style="width:100%;max-width:160px;display:block;margin:0 auto">'+
    // Background circle
    '<circle cx="'+cx+'" cy="'+(cy-10)+'" r="52" fill="'+c.bg+'" opacity="0.15"/>'+
    // Neck
    '<rect x="52" y="58" width="16" height="18" fill="'+c.skin+'" rx="3"/>'+
    // Body/outfit
    getOutfitSVG(code, c.cloth)+
    // Head
    '<ellipse cx="'+cx+'" cy="45" rx="22" ry="24" fill="'+c.skin+'"/>'+
    // Hair
    getHairSVG(code, c.hair)+
    // Eyes
    '<ellipse cx="52" cy="42" rx="2.5" ry="3" fill="#2a2520"/>'+
    '<ellipse cx="68" cy="42" rx="2.5" ry="3" fill="#2a2520"/>'+
    // Eye shine
    '<circle cx="53" cy="41" r="1" fill="#fff" opacity="0.6"/>'+
    '<circle cx="69" cy="41" r="1" fill="#fff" opacity="0.6"/>'+
    // Mouth
    (code[0]==='Q'?
      '<path d="M52,52 Q60,57 68,52" fill="none" stroke="#2a2520" stroke-width="1.5"/>' :
      '<path d="M52,54 Q60,50 68,54" fill="none" stroke="#2a2520" stroke-width="1.5"/>')+
    // Accessory
    getAccessorySVG(code)+
    '</svg>';
}

function shuffleQuestions(){for(let i=QUESTIONS.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[QUESTIONS[i],QUESTIONS[j]]=[QUESTIONS[j],QUESTIONS[i]];}}
function renderQuestion(){
  if(currentQ >= QUESTIONS.length){ finishTest(); return; }
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;
  const pct = (currentQ / total * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('qLabel').textContent = (currentQ+1) + ' / ' + total;
  
  document.getElementById('questionText').textContent = q.q;
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  [{l:'A',t:q.a,v:'left',w:2},{l:'B',t:q.b,v:'left',w:1},{l:'C',t:q.c,v:'right',w:1},{l:'D',t:q.d,v:'right',w:2}].forEach(o=>{
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="option-label">'+o.l+'</span> '+o.t;
    btn.onclick = ()=>selectAnswer(o.v,o.w);
    container.appendChild(btn);
  });
}
function selectAnswer(val,w){
  answers[QUESTIONS[currentQ].dim].push({v:val,w:w});
  currentQ++;
  renderQuestion();
}
function calcResult(){
  let code = '';
  DIM_KEYS.forEach(d=>{
    const a=answers[d];
    let l = a.filter(x=>x.v==='left').reduce((s,x)=>s+x.w,0);
    let r = a.filter(x=>x.v==='right').reduce((s,x)=>s+x.w,0);
    code += l >= r ? POLE_KEYS[d].left : POLE_KEYS[d].right;
  });
  return code;
}
function finishTest(){
  const code = calcResult();
  const type = TYPES[code] || TYPES['DNYI'];
  const arr = code.split('');
  document.getElementById('resultCode').innerHTML = arr.map((c,i)=>{
    const dim=DIMS[i];
    const isLeft=c===POLE_KEYS[dim.id].left;
    return '<span style="color:'+(isLeft?'#d4a853':'#8b7e6e')+'">'+c+'</span>';
  }).join('');
  document.getElementById('resultName').textContent = type.name;
  document.getElementById('resultChar').innerHTML = generateCharSVG(code);
  document.getElementById('resultDesc').textContent = type.desc;
  document.getElementById('resultQuote').textContent = type.quote;
  document.getElementById('resultDims').innerHTML = DIMS.map((d,i)=>{
    const c=arr[i];
    const isLeft=c===POLE_KEYS[d.id].left;
    const fillL=isLeft?'●':'○', fillR=isLeft?'○':'●';
    return '<div class="result-dim">'+d.label+': <span style="color:'+(isLeft?'#d4a853':'#8b7e6e')+'">'+d.left+fillL+' / '+d.right+fillR+'</span></div>';
  }).join('');
  document.getElementById('resultBars').innerHTML = DIMS.map((d,i)=>{
    const a=answers[d.id];
    const l = a.filter(x=>x.v==='left').reduce((s,x)=>s+x.w,0);
    const r = a.filter(x=>x.v==='right').reduce((s,x)=>s+x.w,0);
    const maxScore = 16;
    const lPct = Math.round(l/maxScore*100);
    const rPct = Math.round(r/maxScore*100);
    return '<div class="bar-row"><div class="bar-label">'+d.label+'</div><div class="bar-track"><div class="bar-fill bar-left" style="width:'+lPct+'%"></div><div class="bar-fill bar-right" style="width:'+rPct+'%"></div></div><div class="bar-pct"><span class="pct-left">'+lPct+'%</span><span class="pct-sep">/</span><span class="pct-right">'+rPct+'%</span></div></div>';
  }).join('');
  showScreen('screen-result');
  spawnConfetti();
  const url=new URL(window.location);
  url.searchParams.set('type',code);
  window.history.replaceState({},'',url);
}
function spawnConfetti(){
  const c=document.createElement('div');c.className='confetti-container';
  const cl=['#d4a853','#8b7355','#5a5044','#c8c3bc','#e8e0d6','#3a3530'];
  for(let i=0;i<40;i++){
    const e=document.createElement('div');e.className='confetti-piece';
    e.style.left=Math.random()*100+'%';e.style.background=cl[Math.floor(Math.random()*cl.length)];
    e.style.width=(3+Math.random()*4)+'px';e.style.height=(3+Math.random()*4)+'px';
    e.style.borderRadius=Math.random()>.5?'50%':'0';
    e.style.animationDuration=(2+Math.random()*3)+'s';e.style.animationDelay=Math.random()*1.5+'s';
    c.appendChild(e);
  }
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),5000);
}
function shareResult(){
  const code=calcResult();
  const type=TYPES[code];
  const t='我测出的LCTI类型是：'+code+' · '+type.name+'\n\n'+type.quote+'\n\n你也来试试：https://la-sangre-de-sancho.github.io/game/lcti/';
  if(navigator.share){ navigator.share({title:'LCTI · 历城二中人格测试',text:t,url:'https://la-sangre-de-sancho.github.io/game/lcti/'}).catch(()=>{}); }
  else {
    navigator.clipboard.writeText(t).then(()=>{
      const b=document.querySelector('.result-actions .btn-primary');
      const orig=b.textContent; b.textContent='已复制 ✓';
      setTimeout(()=>b.textContent=orig,2000);
    }).catch(()=>{});
  }
}
function restartTest(){
  const u=new URL(window.location);
  u.searchParams.delete('type');
  window.history.replaceState({},'',u);
  startTest();
}
function viewTypes(){
  const g=document.getElementById('typesGrid');g.innerHTML='';
  Object.entries(TYPES).forEach(([c,t])=>{
    const d=document.createElement('div');
    d.style.cssText='border:1px solid #1a1815;padding:1rem;margin-bottom:.5rem;cursor:pointer;transition:.2s';
    d.onmouseenter=()=>{d.style.borderColor='#3a3530';d.style.background='#0f0f11';};
    d.onmouseleave=()=>{d.style.borderColor='#1a1815';d.style.background='transparent';};
    d.innerHTML='<div style="display:flex;gap:1rem;align-items:center"><div style="width:60px;flex-shrink:0">'+generateCharSVG(c)+'</div><div style="flex:1"><div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:1.2rem;font-weight:600;letter-spacing:.25em;color:#d4a853">'+c+'</span><span style="font-size:.9rem;color:#8b7e6e;letter-spacing:.1em">'+t.name+'</span></div><div style="font-size:.75rem;color:#5a5248;margin-top:.3rem;line-height:1.5">'+t.desc.slice(0,80)+'…</div></div></div>';
    g.appendChild(d);
  });
  showScreen('screen-types');
}
window.addEventListener('DOMContentLoaded',()=>{
  const p=new URLSearchParams(window.location.search);
  const t=p.get('type');
  if(t&&TYPES[t]){
    const a=t.split('');
    DIM_KEYS.forEach((d,i)=>{answers[d]=[];for(let j=0;j<8;j++)answers[d].push(a[i]===POLE_KEYS[d].left?'left':'right');});
    finishTest();
  }
});
</script>
